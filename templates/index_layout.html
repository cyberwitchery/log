<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>log · cyberwitchery lab</title>
  <meta name="description" content="cyberwitchery lab log">

  <!-- No-flash theme init: MUST run before the stylesheet paints -->
  <script>
    (function(){try{var t=localStorage.getItem('cw-log-theme');
      if(t!=='light'&&t!=='dark'){t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';}
      document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
  </script>

  <link rel="stylesheet" href="assets/log.css">
  <link rel="alternate" type="application/rss+xml" title="cyberwitchery log" href="feed.rss">

  <!-- Plausible -->
  <script async src="https://plausible.io/js/pa-F2CvCq_805M4bKTJBD5-g.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
</head>
<body>
  <div class="wrap">

    <header class="masthead">
      <a class="masthead__brand" href="https://cyberwitchery.com/">cyberwitchery lab</a>
      <nav class="masthead__nav">
        <a href="./" aria-current="page">log</a><span>·</span>
        <a href="https://github.com/cyberwitchery/">github</a><span>·</span>
        <a href="feed.rss">rss</a><span>·</span>
        <a href="https://cyberwitchery.com/book/">book a call</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="toggle light / dark" title="toggle light / dark">
          <span class="theme-toggle__glyph"></span>
        </button>
      </nav>
    </header>

    <div class="log-head"><h1>log</h1></div>

    <!-- filter bar: tags ordered by frequency (desc), tie-broken alphabetically.
         the "all" button has no data-tag. -->
    <div class="tag-filter">
      <button class="is-active">all</button>
      {{#alltags}}<button data-tag="{{name}}">#{{name}}</button>{{/alltags}}
    </div>

    <div class="log-list">
      {{#posts}}
      <a class="row" href="{{out_file}}" data-tags="{{data_tags}}">
        <span class="row__date">{{date_iso}}</span>
        <span class="row__title">{{title}}</span>
        <span class="row__tags">{{#tags}}#{{name}} {{/tags}}</span>
        <span class="row__arrow">→</span>
      </a>
      {{/posts}}
    </div>

    <div class="log-count"><!-- filled by log.js --></div>

    <footer class="site-footer">
      <span>© 2026</span><span>·</span>
      <a href="https://cyberwitchery.com/">cyberwitchery gmbh</a><span>·</span>
      <a class="u" href="/imprint.html">imprint</a><span>·</span>
      <a class="u" href="/privacy.html">privacy</a>
    </footer>

  </div>
  <script src="assets/log.js" defer></script>
</body>
</html>
